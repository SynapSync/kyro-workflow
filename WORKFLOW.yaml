name: kyro-workflow
type: workflow
version: "2.8.0"
description: >
  Complete sprint workflow system with specialized agents, lifecycle hooks,
  adaptive per-project learning, and formal validation gates.

author:
  name: SynapSync
  url: https://github.com/SynapSync

license: Apache-2.0

commands:
  - forge       # Full cycle: Analyze → Plan → Implement → Review → Commit
  - status      # Project metrics, velocity, debt heatmap
  - wrap-up     # End-of-session closure ritual with quality check

agents:
  - orchestrator  # Full cycle coordination — analysis, review, debugging, and sprint execution

skills:
  - sprint-forge      # Core orchestration (base skill)
  - kyro-analyzer    # Analysis strategies per work type
  - kyro-reviewer    # Quality checklist (BLOCKER/WARNING/SUGGESTION)
  - kyro-learner     # Per-project rule accumulation
  - kyro-metrics     # Velocity trends and debt heatmap
  - kyro-handoff     # Enriched context transfer with mental model
  - deslop           # AI slop detection and removal

hooks:
  - SessionStart         # Load rules, show active sprint
  - PreToolUse           # Track edits, remind quality gates
  - PostToolUse          # Check for debug artifacts, detect test failures
  - Stop                 # Session check, capture learnings
  - SessionEnd           # Save stats, prompt for learnings
  - UserPromptSubmit     # Drift detection, rule violation check
  - PreCompact           # Save re-entry state before compaction
  - SubagentStart        # Log agent lifecycle
  - SubagentStop         # Log agent completion, post-task quality checklist
  - PostToolUseFailure   # Detect failures, suggest debug protocol

storage:
  project: .agents/sprint-forge/    # Rules, database, sprint documents (per-project)

philosophy:
  - "Learn from every sprint, apply in the next"
  - "Investigate before planning, plan before implementing"
  - "Every task passes a quality gate before closure"
  - "Mental context is as important as code"
  - "Zero dead time — parallel tasks when possible"
  - "Debt never disappears — only its status changes"
  - "The plan serves execution, not the reverse"
